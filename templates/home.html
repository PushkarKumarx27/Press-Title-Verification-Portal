<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>National Press Title Verification Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f4f7fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding-top: 80px;
    }

    .navbar {
      background-color: #002b5c;
    }

    .navbar-brand,
    .nav-link,
    .navbar-text {
      color: #ffffff !important;
    }

    .nav-link:hover {
      text-decoration: underline;
    }

    .card {
      background-color: #ffffff;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      padding: 40px 30px;
      text-align: center;
      max-width: 400px;
      width: 100%;
      margin: auto;
    }

    h2 {
      font-weight: 600;
      color: #002b5c;
      margin-bottom: 30px;
    }

    .btn-custom {
      background-color: #002b5c;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      width: 100%;
      margin-bottom: 15px;
      transition: all 0.3s ease;
    }

    .btn-custom:hover {
      background-color: #004080;
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
    }

    @media (max-width: 768px) {
      .card {
        padding: 30px 20px;
        margin: 20px;
      }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg fixed-top">
    <div class="container">
      <a class="navbar-brand" href="/">National Press Title Verification Portal</a>
      <div class="ms-auto">
        <a class="btn btn-outline-light me-2" href="/admin-login">Admin Dashboard</a>
        <a class="btn btn-outline-light" href="/login">User Dashboard</a>
      </div>
    </div>
  </nav>

  <!-- Login Card -->
  <div class="card mt-5">
    <h2> Select Role to Proceed </h2>
    <a href="/admin-login" class="btn btn-custom">Login as Admin</a>
    <a href="/login" class="btn btn-custom">Login as User</a>
  </div>

</body>
</html>
