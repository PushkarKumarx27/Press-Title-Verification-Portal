<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>National Press Title Verification Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f4f7fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding-top: 70px;
    }

    .navbar {
      background-color: #002b5c;
    }

    .navbar-brand,
    .nav-link,
    .navbar-text {
      color: #ffffff !important;
    }

    .card {
      background-color: #ffffff;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      padding: 30px;
    }

    h3 {
      font-weight: 600;
      color: #002b5c;
    }

    .btn-custom {
      background-color: #002b5c;
      color: #fff;
      transition: all 0.3s ease;
    }

    .btn-custom:hover {
      background-color: #004080;
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
    }

    .result-box {
      margin-top: 25px;
      animation: fadeIn 0.6s ease-in;
    }

    .suggestion-list li {
      margin-bottom: 6px;
    }

    input.form-control {
      border-radius: 8px;
    }

    .list-group-item {
      border: none;
      background-color: #f1f1f1;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .nav-link:hover {
      text-decoration: underline;
    }

   

    @media (max-width: 768px) {
      .card {
        padding: 20px;
      }
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="/">
      National Press Title Verification Portal
    </a>
    <div class="ms-auto">
      <a class="btn btn-outline-light me-2" href="/admin-login">Admin Dashboard</a>
      <a class="btn btn-outline-light me-2" href="/index">User Dashboard</a>
      <a class="btn btn-outline-light" href="/">Log Out</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card">
        <h3 class="text-center mb-4">📝 Verify a Title</h3>
        <div class="form-group mb-3">
          <label for="title" class="form-label">Enter a News/Media Title:</label>
          <input type="text" class="form-control" id="title" placeholder="e.g. Times of Jodhpur">
        </div>
        <div class="text-center">
          <button class="btn btn-custom w-100" onclick="verifyTitle()">Verify Title</button>
        </div>

        <div class="result-box" id="result"></div>

        <div id="extraInputs" class="mt-4" style="display: none;">
          <div class="form-group mb-2">
            <label for="owner" class="form-label">Owner Name:</label>
            <input type="text" class="form-control" id="owner" placeholder="Enter owner name">
          </div>
          <div class="form-group mb-2">
            <label for="state" class="form-label">State:</label>
            <input type="text" class="form-control" id="state" placeholder="Enter state name">
          </div>
          <div class="form-group mb-2">
            <label for="district" class="form-label">District:</label>
            <input type="text" class="form-control" id="district" placeholder="Enter district name">
          </div>
          <div class="text-center mt-3">
            <button id="submitBtn" class="btn btn-success w-100" onclick="submitTitle()">Submit Title</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
  let lastVerifiedTitle = "";
  let lastScore = "";

  function verifyTitle() {
    const title = $("#title").val().trim();
    if (!title) {
      alert("Please enter a title.");
      return;
    }

    $("#result").html(`<div class="text-center text-muted mt-3">Checking... ⏳</div>`);
    $("#extraInputs").hide();

    $.ajax({
      url: "/verify",
      type: "POST",
      contentType: "application/json",
      data: JSON.stringify({ title: title }),
      success: function(response) {
        let html = `<div class="alert ${response.status === 'Verified' ? 'alert-success' : 'alert-danger'}">`;
        html += `<strong>Status:</strong> ${response.status}<br>`;
        if (response.reason) html += `<strong>Reason:</strong> ${response.reason}<br>`;
        if (response.verification_probability) {
          html += `<strong>Verification Score:</strong> ${response.verification_probability}<br>`;
        }
        html += `</div>`;

        if (response.suggestions && response.suggestions.length > 0) {
          html += `<div class="mt-2"><strong>Suggestions:</strong><ul class="list-group suggestion-list">`;
          response.suggestions.forEach(s => {
            html += `<li class="list-group-item">${s}</li>`;
          });
          html += `</ul></div>`;
        }

        $("#result").html(html);

        if (response.status === "Verified") {
          lastVerifiedTitle = response.title;
          lastScore = response.verification_probability;
          $("#extraInputs").show();
        }
      },
      error: function() {
        $("#result").html(`<div class="alert alert-danger">Something went wrong. Please try again.</div>`);
      }
    });
  }

  function submitTitle() {
    const owner = $("#owner").val().trim();
    const state = $("#state").val().trim();
    const district = $("#district").val().trim();

    if (!owner || !state || !district) {
      alert("Please enter Owner name, State, and District.");
      return;
    }

    if (!lastVerifiedTitle || !lastScore) {
      alert("Title or score is missing. Please verify your inputs.");
      return;
    }

    $("#submitBtn").prop("disabled", true).text("Submitting...");

    $.ajax({
      url: "/submit",
      type: "POST",
      contentType: "application/json",
      data: JSON.stringify({
        title: lastVerifiedTitle,
        score: lastScore,
        owner: owner,
        state: state,
        district: district
      }),
      success: function(response) {
        $("#result").html(`
          <div class="alert alert-success text-center">
            ✅ ${response.message}
          </div>
        `);
        $("#title").val("");
        $("#owner").val("");
        $("#state").val("");
        $("#district").val("");
        $("#extraInputs").hide();
        lastVerifiedTitle = "";
        lastScore = "";
      },
      error: function() {
        $("#result").html(`<div class="alert alert-danger">Failed to submit. Please try again.</div>`);
      },
      complete: function() {
        $("#submitBtn").prop("disabled", false).text("Submit Title");
      }
    });
  }
</script>

</body>
</html>
