<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ 'Admin' if admin else 'User' }} Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f4f7fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding-top: 80px;
    }

    .navbar {
      background-color: #002b5c;
    }

    .navbar-brand,
    .nav-link {
      color: #ffffff !important;
    }

    .navbar-brand:hover,
    .nav-link:hover {
      text-decoration: underline;
    }

    .card {
      background-color: #ffffff;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      padding: 40px 30px;
      text-align: center;
      max-width: 450px;
      width: 100%;
      margin: auto;
    }

    h4 {
      font-weight: 600;
      color: #002b5c;
      margin-bottom: 30px;
    }

    .form-control {
      border-radius: 8px;
    }

    .btn-custom {
      background-color: #002b5c;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 8px;
      width: 100%;
      transition: all 0.3s ease;
    }

    .btn-custom:hover {
      background-color: #004080;
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
    }

    .btn-outline-custom {
      border: 2px solid #002b5c;
      color: #002b5c;
      border-radius: 8px;
      padding: 12px;
      width: 100%;
      transition: all 0.3s ease;
    }

    .btn-outline-custom:hover {
      background-color: #002b5c;
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
    }

    .back-link {
      color: #002b5c;
      font-weight: 500;
      text-decoration: none;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .card {
        padding: 30px 20px;
        margin: 20px;
      }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand" href="/">National Press Title Verification Portal</a>
    <div class="ms-auto">
      <a class="btn btn-outline-light me-2" href="/admin-login">Admin Dashboard</a>
      <a class="btn btn-outline-light" href="/login">User Dashboard</a>
    </div>
  </div>
</nav>

<!-- Login/Register Card -->
<div class="card mt-5">
  <h4>{{ 'Admin' if admin else 'User' }} Login</h4>

  {% if admin %}
  <!-- Admin Login Form -->
  <form method="POST">
    <div class="mb-3">
      <input type="password" name="password" class="form-control" placeholder="Admin Password" required>
    </div>
    <button class="btn btn-custom">Login as Admin</button>
  </form>
  {% else %}
  <!-- User Login Form -->
  <form method="POST" action="/login">
    <div class="mb-3">
      <input type="text" name="username" class="form-control" placeholder="Username" required>
    </div>
    <div class="mb-3">
      <input type="password" name="password" class="form-control" placeholder="Password" required>
    </div>
    <button class="btn btn-custom mb-2">Login</button>
    
  </form>

  <div class="text-center mb-3" style="font-weight: 500; color: #555;">or register</div>

  <!-- User Registration Form -->
  <form method="POST" action="/register">
    <div class="mb-3">
      <input type="text" name="username" class="form-control" placeholder="New Username" required>
    </div>
    <div class="mb-3">
      <input type="password" name="password" class="form-control" placeholder="New Password" required>
    </div>
    <button class="btn btn-outline-custom">Register</button>
  </form>
  {% endif %}

  <div class="text-center mt-4">
    <a href="/" class="back-link">← Back to Home</a>
  </div>
</div>

</body>
</html>
